<div class="station-card">
  <h2>{{station_name}}</h2>
  <p><strong>站点ID：</strong>{{station_id}}</p>
  <p><strong>类型：</strong>{{station_type}}</p>
  <p><strong>经度：</strong>{{longitude}}</p>
  <p><strong>纬度：</strong>{{latitude}}</p>
  <p><strong>总客流：</strong>{{total_flow}}</p>

  <div class="chart-section">
    <h3>图表展示</h3>
    <div id="chart-container"></div>
  </div>
</div>
