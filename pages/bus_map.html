<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公交系统</title>
  <link rel="stylesheet" href="../styles/app.css" />
</head>
<body class="map-page">
  <header class="top-bar">
    <div class="brand-title">Mobility Agents System</div>
    <div class="nav-group">
      <button onclick="goHome()">首页</button>
      <button onclick="goPage('./metro_map.html')">地铁系统</button>
      <button onclick="goPage('./about.html')">系统说明</button>
    </div>
  </header>

  <main class="map-page-shell">
    <div class="page-container">
      <div class="page-header">
        <button class="inline-back" onclick="goHome()">返回首页</button>

        <section class="glass-card page-title-card">
          <h1 class="page-title">公交系统</h1>
        </section>
      </div>

      <section class="map-toolbar">
        <div>
          <div class="map-eyebrow">BUS NETWORK</div>
          <div class="map-tip"><span class="desktop-tip">滚轮缩放，按住拖拽平移</span><span class="mobile-tip">双指缩放，单指拖动地图</span></div>
        </div>
        <div class="station-search" role="combobox" aria-expanded="false" aria-owns="station-search-results">
          <label class="sr-only" for="station-search-input">搜索公交站点</label>
          <input id="station-search-input" type="search" autocomplete="off" placeholder="搜索站点 / 拼音 / 首字母" />
          <button id="station-search-clear" class="station-search-clear" type="button" aria-label="清空搜索">×</button>
          <div id="station-search-results" class="station-search-results" role="listbox" hidden></div>
          <div id="station-search-status" class="sr-only" aria-live="polite"></div>
        </div>
        <div class="map-switcher" aria-label="地图系统切换">
          <button class="active" type="button" aria-current="page">公交</button>
          <button type="button" onclick="goPage('./metro_map.html')">地铁</button>
        </div>
      </section>

      <section class="map-stage-section">
        <div id="map-viewport">
          <div id="map-container">
            <picture>
              <source media="(max-width: 767px)" srcset="../assets/images/bus_map_mobile.jpg" />
              <img
                id="map-image"
                src="../assets/images/bus_map.jpg"
                alt="公交地图"
                width="5000"
                height="3351"
                decoding="async"
              />
            </picture>
            <div id="station-layer"></div>
          </div>
          <div class="map-controls" aria-label="地图缩放控件">
            <button type="button" onclick="zoomMapBy(1.25)" aria-label="放大地图">+</button>
            <button type="button" onclick="zoomMapBy(0.8)" aria-label="缩小地图">−</button>
            <button class="map-reset" type="button" onclick="resetMapView()">复位</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div id="station-card-panel" class="station-card-panel" style="display: none;">
    <button class="station-card-close" onclick="closeStationCard()">×</button>
    <div id="station-card-content"></div>
  </div>

  <div id="mobile-station-card-overlay" class="mobile-station-card-overlay" style="display: none;">
    <div class="mobile-station-card-inner">
      <button class="station-card-close" onclick="closeMobileStationCard()">×</button>
      <div id="mobile-station-card-content"></div>
    </div>
  </div>


  <script src="../scripts/utils/constants.js"></script>
  <script src="../scripts/api/data_api.js"></script>
  <script src="../scripts/api/agent_api.js"></script>

  <script src="../scripts/card/suggestion_renderer.js"></script>
  <script src="../scripts/card/chart_renderer.js"></script>
  <script src="../scripts/card/card_renderer.js"></script>
  <script src="../scripts/card/card_controller.js"></script>

  <script src="../scripts/map/geo_mapper.js"></script>
  <script src="../scripts/map/station_search.js"></script>
  <script src="../scripts/map/station_layer.js"></script>
  <script src="../scripts/map/interaction.js"></script>
  <script src="../scripts/map/map_init.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      initMap(STATION_TYPES.BUS);
    });
  </script>
</body>
</html>
