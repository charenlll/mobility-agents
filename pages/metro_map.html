<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>地铁系统</title>
  <link rel="stylesheet" href="../styles/app.css" />
</head>
<body class="map-page">
  <header class="top-bar">
    <div class="brand-title">Mobility Agents System</div>
    <div class="nav-group">
      <button onclick="goHome()">首页</button>
      <button onclick="goPage('./bus_map.html')">公交系统</button>
      <button onclick="goPage('./about.html')">系统说明</button>
    </div>
  </header>

  <main class="map-page-shell">
    <div class="page-container">
      <div class="page-header">
        <button class="inline-back" onclick="goHome()">返回首页</button>

        <section class="glass-card page-title-card">
          <h1 class="page-title">地铁系统</h1>
        </section>
      </div>

      <section class="map-toolbar">
        <div class="map-tip">滚轮可缩放地图，按住鼠标拖拽可平移</div>
      </section>

      <section class="map-stage-section">
        <div id="map-viewport">
          <div id="map-container">
            <img
              id="map-image"
              src="../assets/images/metro_map.jpg"
              alt="地铁地图"
            />
            <div id="station-layer"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div id="station-card-panel" class="station-card-panel" style="display: none;">
    <button class="station-card-close" onclick="closeStationCard()">×</button>
    <div id="station-card-content"></div>
  </div>

  <div id="mobile-station-card-overlay" class="mobile-station-card-overlay" style="display: none;">
    <div class="mobile-station-card-inner">
      <button class="station-card-close" onclick="closeMobileStationCard()">×</button>
      <div id="mobile-station-card-content"></div>
    </div>
  </div>


  <script src="../scripts/utils/constants.js"></script>
  <script src="../scripts/api/data_api.js"></script>
  <script src="../scripts/api/agent_api.js"></script>

  <script src="../scripts/card/suggestion_renderer.js"></script>
  <script src="../scripts/card/chart_renderer.js"></script>
  <script src="../scripts/card/card_renderer.js"></script>
  <script src="../scripts/card/card_controller.js"></script>

  <script src="../scripts/map/geo_mapper.js"></script>
  <script src="../scripts/map/station_layer.js"></script>
  <script src="../scripts/map/interaction.js"></script>
  <script src="../scripts/map/map_init.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      initMap(STATION_TYPES.METRO);
    });
  </script>
</body>
</html>
